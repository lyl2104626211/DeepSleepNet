experiment_name: deepsleepnet_baseline

dataset:
  name: sleep_edf
  raw_dir: data/raw
  processed_dir: data/processed
  label_set: [W, N1, N2, N3, REM]
  epoch_seconds: 30
  split_mode: cross_subject

model:
  name: deepsleepnet_baseline

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  seed: 42
  stage2_batch_size: 8
  stage2_epochs: 50
  stage2_sequence_length: 25
  stage2_sequence_stride: 25
  stage2_eval_stride: 1
  stage2_cnn_learning_rate: 0.0001
  stage2_sequence_learning_rate: 0.001
  stage2_gradient_clip_norm: 5.0

evaluation:
  metrics: [accuracy, macro_f1, cohen_kappa]
  save_confusion_matrix: true

output:
  result_dir: results/deepsleepnet_baseline
